services:
  db:
    container_name: "oes_db"
    build:
      context: .
      dockerfile: ./MySQL/Dockerfile
    networks:
      - default
    restart: always
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    expose: ["3306"]
    # setting some env vars
    environment:
      MYSQL_ROOT_PASSWORD: "root"
      MYSQL_DATABASE: "OES"

      # we mount a data volume to make sure we don't lose data
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password

  cache:
    image: redis:8.0-alpine
    command:
      - redis-server
      - --bind
      - cache
      - --port
      - "6379"
      - --maxmemory
      - "256mb"
      - --maxmemory-policy
      - allkeys-lru
      - --appendonly
      - "yes"
      - --appendfsync
      - everysec
      - --save
      - "900 1"
      - --save
      - "300 10"
      - --save
      - "60 10000"
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "-h", "cache", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    mem_limit: 512m
    mem_reservation: 128m
    expose: ["6379"]
    volumes:
      - cache_data:/data
    networks:
      - default

  server:
    container_name: "oes_server"
    # we want to use the image which is build from our Dockerfile
    build:
      context: .
      dockerfile: ./Server/Dockerfile
    expose: ["9000"]
    ports:
      - "9000:9000"
    # we are depending on the mysql(db) & redis (cache)
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
      messageq:
        condition: service_healthy
      isupport:
        condition: service_started

    networks:
      - default
    # We mount the working dir into the container, handy for development
    # This is what makes the hot reloading work inside of a Docker container
    volumes:
      - ./media:/app/OES/media
    restart: always

  fileserver:
    container_name: "oes_fileserver"
    # we want to use the image which is build from our Dockerfile
    build:
      context: .
      dockerfile: ./FileServer/Dockerfile
    expose: ["8887"]
    ports:
      - "8887:8887"
    networks:
      - default
    # We mount the working dir into the container, handy for development
    # This is what makes the hot reloading work inside of a Docker container
    volumes:
      - ./media:/app/OES/media
    restart: always

  client:
    container_name: "oes_client"
    build:
      context: .
      dockerfile: ./Client/Dockerfile
    networks:
      - default
    restart: always
    ports:
      - "8080:80"
    depends_on:
      - server
      - fileserver
    sysctls:
      net.ipv4.ip_local_port_range: 10000 65535

  mqserver:
    container_name: "oes_mqserver"
    build:
      context: .
      dockerfile: ./MQServer/Dockerfile
    networks:
      - default
    volumes:
      - ./media:/app/OES/media
    restart: always
    depends_on:
      - messageq

  messageq:
    image: "rabbitmq:4-alpine"
    ports:
      - "5672:5672"
    restart: always
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 1g
    mem_reservation: 256m
    environment:
      RABBITMQ_ERLANG_COOKIE: "SWQOKODSQALRPCLNMEQG"
      RABBITMQ_DEFAULT_USER: "rabbitmq"
      RABBITMQ_DEFAULT_PASS: "rabbitmq"
      RABBITMQ_DEFAULT_VHOST: "/"
      # Prevent broker from blocking publishers when memory reaches 40% of
      # the container limit (1g * 0.4 = 400 MB). Mirrors k8s/messageq-deployment.yaml.
      RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS: "-rabbit vm_memory_high_watermark 0.4"

  ollama:
    image: ollama/ollama
    container_name: "oes_ollama"
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - default
    restart: always
    # Pull llama3.2:3b (LLM) and nomic-embed-text (embeddings) on first startup
    entrypoint: ["/bin/sh", "-c", "ollama serve & sleep 10 && ollama pull llama3.2:3b && ollama pull nomic-embed-text && wait"]

  isupport:
    container_name: "oes_isupport"
    ports:
      - "50051:50051"
    build:
      context: .
      dockerfile: ./IntelligenceSupport/questgen/Dockerfile
    networks:
      - default
    restart: always
    depends_on:
      - ollama
      - vectordb
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - CHROMA_HOST=vectordb
      - CHROMA_PORT=8000
      - LLM_MODEL=llama3.2:3b
      - EMBED_MODEL=nomic-embed-text

  vectordb:
    image: chromadb/chroma:latest
    container_name: "oes_vectordb"
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma
    networks:
      - default
    restart: always
    environment:
      - IS_PERSISTENT=TRUE
      - ALLOW_RESET=FALSE

  liveserver:
    container_name: "oes_liveserver"
    ports:
      - "1935:1935"
    build:
      context: .
      dockerfile: ./LiveStreamingServer/Dockerfile
    networks:
      - default
    volumes:
      - ./media/video/liveData:/mnt/hls
    restart: always

networks:
  default:
    driver: bridge
volumes:
  mysql_data:
  cache_data:
  ollama_data:
  chroma_data:
# docker-compose up --build
