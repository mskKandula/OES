worker_processes auto;
pid /run/nginx.pid;
worker_rlimit_nofile 500000;

events {
        worker_connections 65535;
        multi_accept on;
        use epoll;
        }

http{
   proxy_read_timeout 300;
   proxy_connect_timeout 300;
   proxy_send_timeout 300;

   gzip on;
   gzip_comp_level 6;
   gzip_min_length 1000;
   gzip_types text/plain text/css application/json application/javascript application/x-javascript text/javascript text/xml application/xml application/wasm;  # compress WASM too!

   include /etc/nginx/mime.types;

server { 
    listen 80;

    client_max_body_size 1M; # default for most routes

    location /api/r/uploadVideoContent {
        client_max_body_size 15M;  # match Go server's 10MB + overhead
        proxy_pass http://server:9000;
    }

    location /api/r/uploadExamProof {
        client_max_body_size 50M;  # zip of webcam images
        proxy_pass http://server:9000;
    }

    location /api/r/multipleStudentsRegistration {
        client_max_body_size 100K; # xlsx is tiny
        proxy_pass http://server:9000;
    }

    location / {
        index index.html;
        root /usr/share/nginx/html;
        try_files $uri $uri/ $uri.html =404;
    }

      location /api {
        rewrite ^/api(.*)$ $1 break;
        proxy_pass http://server:9000;        
    }

     location /cdn {
        rewrite ^/cdn(.*)$ $1 break;
        proxy_pass http://fileserver:8887;
    }

    location /r/ws {
        proxy_pass http://server:9000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
    }
}
}
