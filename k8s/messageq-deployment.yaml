# =============================================================================
# OES — RabbitMQ 4 StatefulSet + Service
#
# Design decisions:
#   - StatefulSet for stable pod name and PVC binding.
#   - Two durable queues: "encode" (video transcoding) and "email" (welcome mail).
#   - Management plugin disabled in production (no port 15672 exposed externally).
#     To enable for debugging: add RABBITMQ_ENABLED_PLUGINS=rabbitmq_management
#     and add an internal-only service on 15672.
#   - Memory high-watermark set to 40% of container limit to prevent broker OOM.
#   - Credentials injected from oes-secrets.
#   - Liveness: rabbitmq-diagnostics ping; Readiness: rabbitmq-diagnostics check_running.
# =============================================================================
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: oes-messageq
  namespace: oes
  labels:
    app.kubernetes.io/name: oes-messageq
    app.kubernetes.io/component: message-queue
    app.kubernetes.io/part-of: oes-platform
spec:
  serviceName: oes-messageq
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: oes-messageq
  template:
    metadata:
      labels:
        app.kubernetes.io/name: oes-messageq
        app.kubernetes.io/component: message-queue
        app.kubernetes.io/part-of: oes-platform
    spec:
      terminationGracePeriodSeconds: 60

      securityContext:
        fsGroup: 999
        runAsNonRoot: false  # RabbitMQ requires rabbitmq user setup internally

      containers:
        - name: rabbitmq
          image: rabbitmq:4-alpine
          imagePullPolicy: IfNotPresent

          ports:
            - name: amqp
              containerPort: 5672
              protocol: TCP
            - name: management
              containerPort: 15672
              protocol: TCP

          env:
            - name: RABBITMQ_DEFAULT_USER
              valueFrom:
                secretKeyRef:
                  name: oes-secrets
                  key: rabbitmq-user
            - name: RABBITMQ_DEFAULT_PASS
              valueFrom:
                secretKeyRef:
                  name: oes-secrets
                  key: rabbitmq-password
            - name: RABBITMQ_DEFAULT_VHOST
              value: "/"
            - name: RABBITMQ_ERLANG_COOKIE
              value: "SWQOKODSQALRPCLNMEQG"
            # Prevent broker from paging to disk under load
            - name: RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS
              value: "-rabbit vm_memory_high_watermark 0.4"
            - name: RABBITMQ_NODE_PORT
              value: "5672"

          volumeMounts:
            - name: rabbitmq-data
              mountPath: /var/lib/rabbitmq

          livenessProbe:
            exec:
              command:
                - rabbitmq-diagnostics
                - ping
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 5

          readinessProbe:
            exec:
              command:
                - rabbitmq-diagnostics
                - check_running
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 5

          startupProbe:
            exec:
              command:
                - rabbitmq-diagnostics
                - ping
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 15
            failureThreshold: 30  # 5 min for first boot

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "384Mi"

          securityContext:
            allowPrivilegeEscalation: false

      volumes:
        - name: rabbitmq-data
          persistentVolumeClaim:
            claimName: oes-rabbitmq-data

---
# =============================================================================
# RabbitMQ ClusterIP Service — AMQP port only (internal)
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: oes-messageq
  namespace: oes
  labels:
    app.kubernetes.io/name: oes-messageq
    app.kubernetes.io/component: message-queue
    app.kubernetes.io/part-of: oes-platform
spec:
  clusterIP: None  # Headless for StatefulSet
  selector:
    app.kubernetes.io/name: oes-messageq
  ports:
    - name: amqp
      port: 5672
      targetPort: 5672
      protocol: TCP

---
# =============================================================================
# RabbitMQ Management UI — internal ClusterIP (access via kubectl port-forward)
# kubectl port-forward svc/oes-messageq-mgmt 15672:15672 -n oes
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: oes-messageq-mgmt
  namespace: oes
  labels:
    app.kubernetes.io/name: oes-messageq
    app.kubernetes.io/component: message-queue
    app.kubernetes.io/part-of: oes-platform
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: oes-messageq
  ports:
    - name: management
      port: 15672
      targetPort: 15672
      protocol: TCP
