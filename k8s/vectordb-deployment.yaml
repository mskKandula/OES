# =============================================================================
# OES — ChromaDB Vector Database Deployment + Service
#
# Design decisions:
#   - ChromaDB is used by oes-isupport (Python gRPC) for the RAG pipeline:
#       * QuestGen RPC: upserts document chunks, retrieves relevant context.
#       * AskQuestion RPC: retrieves course material for student Q&A.
#   - Single replica — ChromaDB HttpServer is stateful (data on PVC).
#     Horizontal scaling requires the distributed ChromaDB cluster mode.
#   - strategy: Recreate — only one instance should own the chroma PVC.
#   - PVC at /chroma/chroma stores the persistent vector store data.
#   - IS_PERSISTENT=TRUE ensures data survives pod restarts.
#   - ALLOW_RESET=FALSE prevents accidental collection wipes in production.
#   - Liveness/readiness: HTTP GET /api/v2/heartbeat (ChromaDB health endpoint).
#   - Telemetry disabled via ANONYMIZED_TELEMETRY=FALSE.
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: oes-vectordb
  namespace: oes
  labels:
    app.kubernetes.io/name: oes-vectordb
    app.kubernetes.io/component: vector-database
    app.kubernetes.io/part-of: oes-platform
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: oes-vectordb
  strategy:
    type: Recreate  # Only one instance should own the chroma data PVC
  template:
    metadata:
      labels:
        app.kubernetes.io/name: oes-vectordb
        app.kubernetes.io/component: vector-database
        app.kubernetes.io/part-of: oes-platform
    spec:
      terminationGracePeriodSeconds: 30

      securityContext:
        runAsNonRoot: false
        runAsUser: 0

      containers:
        - name: oes-vectordb
          image: chromadb/chroma:latest
          imagePullPolicy: IfNotPresent

          ports:
            - name: http
              containerPort: 8000
              protocol: TCP

          env:
            - name: IS_PERSISTENT
              value: "TRUE"
            - name: ALLOW_RESET
              value: "FALSE"
            - name: ANONYMIZED_TELEMETRY
              value: "FALSE"
            # Chroma data directory
            - name: CHROMA_DB_DIR
              value: "/chroma/chroma"

          volumeMounts:
            - name: chroma-data
              mountPath: /chroma/chroma

          livenessProbe:
            httpGet:
              path: /api/v2/heartbeat
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 5

          readinessProbe:
            httpGet:
              path: /api/v2/heartbeat
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          startupProbe:
            httpGet:
              path: /api/v2/heartbeat
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 20

          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "2Gi"

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false  # ChromaDB writes to /chroma/chroma

      volumes:
        - name: chroma-data
          persistentVolumeClaim:
            claimName: oes-chroma-data

---
# =============================================================================
# ChromaDB ClusterIP Service (internal — only isupport needs to reach it)
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: oes-vectordb
  namespace: oes
  labels:
    app.kubernetes.io/name: oes-vectordb
    app.kubernetes.io/component: vector-database
    app.kubernetes.io/part-of: oes-platform
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: oes-vectordb
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      protocol: TCP
