# =============================================================================
# OES — Redis 8 StatefulSet + Service
#
# Design decisions:
#   - StatefulSet for stable identity and ordered restarts.
#   - Redis is used for two purposes: cache (GET/SET) and WebSocket pub/sub.
#   - bind address set to 0.0.0.0 so intra-cluster connections work.
#   - Persistence enabled (appendonly yes) so pub/sub subscriber channels
#     survive a pod restart without losing in-flight messages.
#   - Resource limits sized for low-to-medium cache + pub/sub workload.
#   - liveness uses redis-cli PING; readiness waits for "PONG" response.
# =============================================================================
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: oes-cache
  namespace: oes
  labels:
    app.kubernetes.io/name: oes-cache
    app.kubernetes.io/component: cache
    app.kubernetes.io/part-of: oes-platform
spec:
  serviceName: oes-cache
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: oes-cache
  template:
    metadata:
      labels:
        app.kubernetes.io/name: oes-cache
        app.kubernetes.io/component: cache
        app.kubernetes.io/part-of: oes-platform
    spec:
      terminationGracePeriodSeconds: 30

      securityContext:
        runAsNonRoot: false
        runAsUser: 0

      containers:
        - name: redis
          image: redis:8.0-alpine
          imagePullPolicy: IfNotPresent
          command:
            - redis-server
            - --bind
            - "0.0.0.0"
            - --port
            - "6379"
            - --appendonly
            - "yes"
            - --appendfsync
            - everysec
            - --maxmemory
            - "256mb"
            - --maxmemory-policy
            - allkeys-lru
            - --save
            - "900 1"
            # Removed aggressive 300s and 60s RDB save rules to reduce disk I/O.
            # AOF (appendonly yes) already provides crash recovery.

          ports:
            - name: redis
              containerPort: 6379
              protocol: TCP

          volumeMounts:
            - name: redis-data
              mountPath: /data

          livenessProbe:
            exec:
              command:
                - redis-cli
                - -h
                - localhost
                - ping
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 5

          readinessProbe:
            exec:
              command:
                - redis-cli
                - -h
                - localhost
                - ping
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "320Mi"  # Redis self-caps at 256mb via --maxmemory

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false  # Redis needs /data writeable
            capabilities:
              drop:
                - ALL

      volumes:
        - name: redis-data
          persistentVolumeClaim:
            claimName: oes-redis-data

---
# =============================================================================
# Redis ClusterIP Service — headless for StatefulSet DNS stability
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: oes-cache
  namespace: oes
  labels:
    app.kubernetes.io/name: oes-cache
    app.kubernetes.io/component: cache
    app.kubernetes.io/part-of: oes-platform
spec:
  clusterIP: None  # Headless — oes-cache resolves directly to pod IP
  selector:
    app.kubernetes.io/name: oes-cache
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
      protocol: TCP
