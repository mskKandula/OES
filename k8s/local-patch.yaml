# =============================================================================
# Local deployment patch for docker-desktop development.
# Overrides image names and imagePullPolicy to use locally built images.
# Apply with: kubectl apply -k k8s/ (after kustomization.yaml references this)
# =============================================================================

# ── oes-server ────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: oes-server
  namespace: oes
spec:
  template:
    spec:
      containers:
        - name: oes-server
          image: oes-server:local
          imagePullPolicy: Never

