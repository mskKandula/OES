# =============================================================================
# OES — Go API Server Deployment + Services
# Local Docker Desktop version — single replica, no HPA, no topology constraints
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: oes-server
  namespace: oes
  labels:
    app.kubernetes.io/name: oes-server
    app.kubernetes.io/component: api-server
    app.kubernetes.io/part-of: oes-platform
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: oes-server
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: oes-server
        app.kubernetes.io/component: api-server
        app.kubernetes.io/part-of: oes-platform
    spec:
      terminationGracePeriodSeconds: 30

      securityContext:
        runAsNonRoot: false
        runAsUser: 0

      # ── Wait for dependencies before the app starts ────────────────────────
      initContainers:
        - name: wait-for-mysql
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z oes-db 3306; do
                echo "Waiting for MySQL (oes-db:3306)..."; sleep 3;
              done
              echo "MySQL is up."

        - name: wait-for-redis
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z oes-cache 6379; do
                echo "Waiting for Redis (oes-cache:6379)..."; sleep 3;
              done
              echo "Redis is up."

        - name: wait-for-rabbitmq
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z oes-messageq 5672; do
                echo "Waiting for RabbitMQ (oes-messageq:5672)..."; sleep 3;
              done
              echo "RabbitMQ is up."

        - name: create-log-dir
          image: busybox:1.36
          command: ["sh", "-c", "mkdir -p /app/OES/server/Logs"]
          volumeMounts:
            - name: log-dir
              mountPath: /app/OES/server/Logs
          securityContext:
            runAsUser: 0

      containers:
        - name: oes-server
          image: mskkandula/oes:server
          imagePullPolicy: Always

          ports:
            - name: http
              containerPort: 9000
              protocol: TCP

          volumeMounts:
            - name: server-config
              mountPath: /app/OES/server/config.json
              subPath: config.json
              readOnly: true
            - name: media
              mountPath: /app/OES/media
            - name: log-dir
              mountPath: /app/OES/server/Logs

          # ── Probes ────────────────────────────────────────────────────────
          livenessProbe:
            httpGet:
              path: /o/status
              port: 9000
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /o/status
              port: 9000
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3

          startupProbe:
            httpGet:
              path: /o/status
              port: 9000
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 30

          resources:
            requests:
              cpu: "250m"
              memory: "128Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false

      volumes:
        - name: server-config
          secret:
            secretName: oes-server-config-secret
        - name: media
          persistentVolumeClaim:
            claimName: oes-media
        - name: log-dir
          emptyDir: {}

---
# =============================================================================
# Go API Server ClusterIP Service (internal)
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: oes-server
  namespace: oes
  labels:
    app.kubernetes.io/name: oes-server
    app.kubernetes.io/component: api-server
    app.kubernetes.io/part-of: oes-platform
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: oes-server
  ports:
    - name: http
      port: 9000
      targetPort: 9000
      protocol: TCP

---
# =============================================================================
# Go API Server NodePort Service — external access on port 30900
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: oes-server-nodeport
  namespace: oes
  labels:
    app.kubernetes.io/name: oes-server
    app.kubernetes.io/component: api-server
    app.kubernetes.io/part-of: oes-platform
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: oes-server
  ports:
    - name: http
      port: 9000
      targetPort: 9000
      nodePort: 30900
      protocol: TCP

---
# =============================================================================
# PodDisruptionBudget
# =============================================================================
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: oes-server-pdb
  namespace: oes
  labels:
    app.kubernetes.io/name: oes-server
    app.kubernetes.io/part-of: oes-platform
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: oes-server
