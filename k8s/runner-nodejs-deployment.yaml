# =============================================================================
# OES — Node.js Warm Runner Pool Deployment
#
# Purpose: Pre-warmed pods for Node.js code execution via Kubernetes pods/exec.
#          code-executor runs: kubectl exec <pod> -- node -e "<user_code>"
#
# node -e executes inline code without writing any files, so
# readOnlyRootFilesystem: true is safe here (same as Python).
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: oes-runner-nodejs
  namespace: oes
  labels:
    app.kubernetes.io/name: oes-runner-nodejs
    app.kubernetes.io/component: code-runner
    app.kubernetes.io/language: nodejs
    app.kubernetes.io/part-of: oes-platform
spec:
  replicas: 2
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: oes-runner-nodejs
  template:
    metadata:
      labels:
        app.kubernetes.io/name: oes-runner-nodejs
        app.kubernetes.io/component: code-runner
        app.kubernetes.io/language: nodejs
        app.kubernetes.io/part-of: oes-platform
    spec:
      automountServiceAccountToken: false

      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        seccompProfile:
          type: RuntimeDefault

      containers:
        - name: runner
          image: node:26-alpine
          imagePullPolicy: IfNotPresent

          command: ["sleep", "infinity"]

          resources:
            requests:
              cpu: "200m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: oes-runner-nodejs-pdb
  namespace: oes
  labels:
    app.kubernetes.io/name: oes-runner-nodejs
    app.kubernetes.io/part-of: oes-platform
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: oes-runner-nodejs
