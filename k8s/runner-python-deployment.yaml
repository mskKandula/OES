# =============================================================================
# OES — Python Warm Runner Pool Deployment
#
# Purpose: Pre-warmed pods that accept code execution via Kubernetes pods/exec.
#          The code-executor service selects a Ready pod, runs:
#            kubectl exec <pod> -- python3 -c "<user_code>"
#          then deletes the pod. The Deployment controller immediately creates
#          a fresh replacement to maintain minReplicas warm pods.
#
# Security:
#   - runAsNonRoot + non-zero UID: no root execution
#   - allowPrivilegeEscalation: false
#   - capabilities: drop ALL — no Linux capabilities
#   - seccompProfile: RuntimeDefault — kernel-level syscall filtering
#   - readOnlyRootFilesystem: true — Python -c needs no writable FS
#   - Hard CPU/memory limits prevent resource exhaustion attacks
#
# NetworkPolicy (in networkpolicy.yaml) enforces:
#   - Zero egress from runner pods (code cannot call external APIs)
#   - Ingress only from code-executor pod
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: oes-runner-python
  namespace: oes
  labels:
    app.kubernetes.io/name: oes-runner-python
    app.kubernetes.io/component: code-runner
    app.kubernetes.io/language: python
    app.kubernetes.io/part-of: oes-platform
spec:
  replicas: 2
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: oes-runner-python
  template:
    metadata:
      labels:
        app.kubernetes.io/name: oes-runner-python
        app.kubernetes.io/component: code-runner
        app.kubernetes.io/language: python
        app.kubernetes.io/part-of: oes-platform
    spec:
      # No ServiceAccount needed — runner pods make no Kubernetes API calls
      automountServiceAccountToken: false

      securityContext:
        runAsNonRoot: true
        runAsUser: 65534    # nobody
        runAsGroup: 65534
        seccompProfile:
          type: RuntimeDefault

      containers:
        - name: runner
          image: python:3.14-slim
          imagePullPolicy: IfNotPresent

          # sleep infinity keeps the pod alive and idle.
          # code-executor execs into this container per request.
          command: ["sleep", "infinity"]

          resources:
            requests:
              cpu: "200m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]

---
# =============================================================================
# PodDisruptionBudget — ensure at least 1 warm pod during node maintenance
# =============================================================================
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: oes-runner-python-pdb
  namespace: oes
  labels:
    app.kubernetes.io/name: oes-runner-python
    app.kubernetes.io/part-of: oes-platform
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: oes-runner-python
