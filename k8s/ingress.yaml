# =============================================================================
# OES — Nginx Ingress
#
# Design decisions:
#   - Uses the kubernetes/ingress-nginx controller (nginx.ingress.kubernetes.io).
#   - A single Ingress rule routes all HTTP traffic to oes-client:80, which
#     already acts as the reverse proxy for /api, /cdn, and /r/ws.
#     This matches the Docker Compose topology exactly.
#   - WebSocket (sticky) upgrade is enabled via nginx.ingress.kubernetes.io
#     annotations to ensure the Nginx client pod handles the full WS lifecycle
#     for a given connection (important for WebSocket keepalive).
#   - TLS terminated at the Ingress controller using a cert-manager Certificate
#     (or a manually-created secret named oes-tls).
#     Replace `oes.example.com` with your actual domain.
#   - proxy-body-size set to 50m globally; individual route overrides are
#     handled inside the oes-client nginx.conf reverse proxy (not the Ingress).
#   - gRPC service (oes-isupport:50051) is exposed via a separate Ingress with
#     the grpc backend protocol annotation for proper HTTP/2 passthrough.
#     In most setups this is accessed only internally; expose only if needed.
# =============================================================================

# ── HTTP Ingress for the SPA + API (local cluster — no TLS, no cert-manager) ─
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: oes-ingress
  namespace: oes
  labels:
    app.kubernetes.io/name: oes-ingress
    app.kubernetes.io/part-of: oes-platform
  annotations:
    # ── Ingress class ────────────────────────────────────────────────────────
    kubernetes.io/ingress.class: "nginx"

    # ── Disable SSL redirect for local HTTP-only cluster ─────────────────────
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "false"

    # ── Body size (largest upload is 50M exam proof zip) ─────────────────────
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"

    # ── Timeouts ─────────────────────────────────────────────────────────────
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "60"

    # ── WebSocket support ────────────────────────────────────────────────────
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;

    # ── CORS ─────────────────────────────────────────────────────────────────
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "*"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "DNT,X-CustomHeader,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Authorization"

spec:
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: oes-client
                port:
                  number: 80
