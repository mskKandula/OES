# =============================================================================
# OES — MySQL 8 StatefulSet + Service
#
# Design decisions:
#   - StatefulSet (not Deployment) ensures stable pod identity and ordered
#     rolling updates — critical for a single-node DB that owns a PVC.
#   - init container pre-creates the /var/lib/mysql dir with correct perms.
#   - Liveness probe uses mysqladmin ping; readiness uses a SELECT 1 query
#     so traffic is only routed when MySQL is fully ready to accept connections.
#   - Resource limits prevent MySQL from consuming all node memory under load.
#   - The SQL init script is auto-executed at first boot via the mysql image's
#     docker-entrypoint-initdb.d/ convention (ConfigMap mount).
# =============================================================================
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: oes-db
  namespace: oes
  labels:
    app.kubernetes.io/name: oes-db
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: oes-platform
spec:
  serviceName: oes-db
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: oes-db
  template:
    metadata:
      labels:
        app.kubernetes.io/name: oes-db
        app.kubernetes.io/component: database
        app.kubernetes.io/part-of: oes-platform
    spec:
      terminationGracePeriodSeconds: 60

      # ── Security context ───────────────────────────────────────────────────
      securityContext:
        fsGroup: 999       # mysql group id in the official image
        runAsNonRoot: false # MySQL requires root internally

      initContainers:
        - name: fix-permissions
          image: busybox:1.36
          command: ["sh", "-c", "chown -R 999:999 /var/lib/mysql"]
          volumeMounts:
            - name: mysql-data
              mountPath: /var/lib/mysql
          securityContext:
            runAsUser: 0

      containers:
        - name: mysql
          image: mskkandula/oes:db
          imagePullPolicy: Always
          args:
            - --default-authentication-plugin=mysql_native_password
            - --character-set-server=utf8mb4
            - --collation-server=utf8mb4_unicode_ci
            - --max_connections=500
            - --innodb_buffer_pool_size=512M

          ports:
            - name: mysql
              containerPort: 3306
              protocol: TCP

          # ── Credentials from Secret ───────────────────────────────────────
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: oes-secrets
                  key: mysql-root-password
            - name: MYSQL_DATABASE
              value: "OES"

          # ── Init SQL mounted from ConfigMap ───────────────────────────────
          volumeMounts:
            - name: mysql-data
              mountPath: /var/lib/mysql
            - name: initdb
              mountPath: /docker-entrypoint-initdb.d
              readOnly: true

          # ── Probes ────────────────────────────────────────────────────────
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - "mysqladmin ping -h localhost -u root -p${MYSQL_ROOT_PASSWORD}"
            initialDelaySeconds: 45
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 5

          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - "mysql -h localhost -u root -p${MYSQL_ROOT_PASSWORD} -e 'SELECT 1' OES"
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5

          startupProbe:
            exec:
              command:
                - sh
                - -c
                - "mysqladmin ping -h localhost -u root -p${MYSQL_ROOT_PASSWORD}"
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 30  # allows up to 5 min for first init

          # ── Resources ─────────────────────────────────────────────────────
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2000m"
              memory: "2Gi"

      volumes:
        - name: mysql-data
          persistentVolumeClaim:
            claimName: oes-mysql-data
        - name: initdb
          configMap:
            name: oes-mysql-initdb

---
# =============================================================================
# MySQL init SQL ConfigMap
# The oes.sql schema is loaded into the DB on first boot automatically.
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: oes-mysql-initdb
  namespace: oes
  labels:
    app.kubernetes.io/name: oes-db
    app.kubernetes.io/part-of: oes-platform
data:
  oes.sql: |
    CREATE TABLE IF NOT EXISTS `Examiners`(
        id INT NOT NULL AUTO_INCREMENT,
        name VARCHAR(45) NOT NULL,
        age INT,
        email VARCHAR(45) NOT NULL,
        mobileNo VARCHAR(45) NOT NULL,
        password VARCHAR(100) NOT NULL,
        clientId VARCHAR(100) NOT NULL,
        PRIMARY KEY (`id`)
    );
    CREATE TABLE IF NOT EXISTS `Students` (
        id INT NOT NULL AUTO_INCREMENT,
        name VARCHAR(45) NOT NULL,
        email VARCHAR(45) NOT NULL UNIQUE,
        mobileNo VARCHAR(45) NOT NULL UNIQUE,
        password VARCHAR(100) NOT NULL,
        clientId VARCHAR(100) NOT NULL,
        PRIMARY KEY (`id`)
    );
    CREATE TABLE IF NOT EXISTS `Menu` (
        id INT NOT NULL AUTO_INCREMENT,
        name VARCHAR(45) NOT NULL,
        url VARCHAR(45) NOT NULL,
        description VARCHAR(45) NOT NULL,
        PRIMARY KEY (`id`)
    );
    INSERT IGNORE INTO `Menu`(`name`, `url`, `description`) VALUES
        ('Dashboard', '/dashboard', 'Dashboard'),
        ('MultipleStudentsRegistration', '/multipleStudentsRegistration', 'MultipleStudentsRegistration'),
        ('StudentsList', '/studentsList', 'StudentsList'),
        ('Uploadquestions', '/uploadQuestions', 'Uploadquestions'),
        ('UploadVideo', '/uploadVideo', 'UploadVideo'),
        ('StudentDashboard', '/studentDashboard', 'StudentDashboard'),
        ('Exam', '/onlineExam', 'Exam'),
        ('VideoContent', '/fetchVideos', 'VideoContent'),
        ('WhiteBoard', '/whiteBoard', 'WhiteBoard'),
        ('BroadcastVideo', '/broadcastVideo?publish=true', 'BroadcastVideo'),
        ('BroadcastVideo', '/broadcastVideo', 'BroadcastVideo'),
        ('Generate Questions', '/questionGen', 'GenerateQuestions'),
        ('Live Video', '/playVideo', 'Live Video');
    CREATE TABLE IF NOT EXISTS `Role` (
        id INT NOT NULL AUTO_INCREMENT,
        name VARCHAR(45) NOT NULL,
        PRIMARY KEY (`id`)
    );
    INSERT IGNORE INTO `Role`(`name`) VALUES('Examiner'), ('Student');
    CREATE TABLE IF NOT EXISTS `UserRole` (
        userId INT NOT NULL,
        roleId INT NOT NULL,
        FOREIGN KEY(`roleId`) REFERENCES Role(`id`),
        PRIMARY KEY(`userId`, `roleId`)
    );
    CREATE TABLE IF NOT EXISTS `RoleMenu` (
        roleId INT NOT NULL,
        menuId INT NOT NULL,
        FOREIGN KEY(`roleId`) REFERENCES Role(`id`),
        FOREIGN KEY(`menuId`) REFERENCES Menu(`id`),
        PRIMARY KEY(`roleId`, `menuId`)
    );
    INSERT IGNORE INTO `RoleMenu`(`roleId`, `menuId`) VALUES
        (2,6),(2,7),(2,8),(2,9),(2,11),
        (1,1),(1,2),(1,3),(1,4),(1,5),(1,9),(1,10),(1,12),(1,13);
    CREATE TABLE IF NOT EXISTS `VideoContent`(
        id INT NOT NULL AUTO_INCREMENT,
        name VARCHAR(45) NOT NULL,
        videoUrl VARCHAR(100) NOT NULL,
        thumbnailPath VARCHAR(100) NOT NULL,
        contentType VARCHAR(50) NOT NULL,
        description VARCHAR(100),
        clientId VARCHAR(100) NOT NULL,
        PRIMARY KEY (`id`)
    );
    CREATE TABLE IF NOT EXISTS `Exams`(
        id INT NOT NULL AUTO_INCREMENT,
        name VARCHAR(50) NOT NULL,
        type VARCHAR(45),
        clientId VARCHAR(100) NOT NULL,
        createdOn TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
        PRIMARY KEY (`id`)
    );
    CREATE TABLE IF NOT EXISTS `StudentExamProofs`(
        id INT NOT NULL AUTO_INCREMENT,
        studentId INT NOT NULL,
        examId INT NOT NULL,
        proofPath VARCHAR(100) NOT NULL,
        createdOn TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
        FOREIGN KEY(`studentId`) REFERENCES Students(`id`),
        FOREIGN KEY(`examId`) REFERENCES Exams(`id`),
        PRIMARY KEY (`id`)
    );
    CREATE TABLE IF NOT EXISTS `StudentExamMarks`(
        studentId INT NOT NULL,
        examId INT NOT NULL,
        marks INT,
        FOREIGN KEY(`studentId`) REFERENCES Students(`id`),
        FOREIGN KEY(`examId`) REFERENCES Exams(`id`),
        PRIMARY KEY (`studentId`, `examId`)
    );

---
# =============================================================================
# MySQL ClusterIP Service (internal only — never exposed externally)
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: oes-db
  namespace: oes
  labels:
    app.kubernetes.io/name: oes-db
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: oes-platform
spec:
  clusterIP: None  # Headless service for StatefulSet stable DNS
  selector:
    app.kubernetes.io/name: oes-db
  ports:
    - name: mysql
      port: 3306
      targetPort: 3306
      protocol: TCP
