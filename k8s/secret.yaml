# =============================================================================
# OES — Secrets
# All values are base64-encoded. In production, replace this file with
# Sealed Secrets, External Secrets Operator, or Vault Agent injection.
#
# To regenerate:
#   echo -n 'yourvalue' | base64
#
# Defaults encoded below (DO NOT use in production):
#   mysql-root-password : root          → cm9vdA==
#   mysql-password      : root          → cm9vdA==
#   rabbitmq-password   : rabbitmq      → cmFiYml0bXE=
#   rabbitmq-user       : rabbitmq      → cmFiYml0bXE=
#   jwt-secret          : 7yt65U745TR57lo9h%$fre#$TR43EW → base64 below
#   smtp-email          : <blank>       → replace before deploying
#   smtp-password       : <blank>       → replace before deploying
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: oes-secrets
  namespace: oes
  labels:
    app.kubernetes.io/name: oes
    app.kubernetes.io/part-of: oes-platform
type: Opaque
stringData:
  # MySQL
  mysql-root-password: "root"
  mysql-password: "root"

  # RabbitMQ
  rabbitmq-user: "rabbitmq"
  rabbitmq-password: "rabbitmq"

  # JWT signing secret — MUST be rotated in production
  jwt-secret: "7yt65U745TR57lo9h%$fre#$TR43EW"

  # SMTP — leave empty; inject at deploy time via CI/CD or Vault
  smtp-email: ""
  smtp-password: ""

---
# =============================================================================
# server config.json Secret — contains DSNs with embedded credentials.
# Mounted as /app/OES/server/config.json inside the server container.
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: oes-server-config-secret
  namespace: oes
  labels:
    app.kubernetes.io/name: oes-server
    app.kubernetes.io/part-of: oes-platform
type: Opaque
stringData:
  config.json: |
    {
      "database": {
        "MySqlDSN":    "root:root@tcp(oes-db:3306)/OES",
        "RedisDSN":    "redis://oes-cache:6379/0",
        "RabbitMQDSN": "amqp://rabbitmq:rabbitmq@oes-messageq/",
        "GRPCDSN":     "oes-isupport:50051"
      }
    }
